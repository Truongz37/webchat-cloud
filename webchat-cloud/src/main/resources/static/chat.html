<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Web Chat Cloud</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        #chat-box { width: 400px; height: 300px; border: 1px solid #ccc; overflow-y: scroll; padding: 10px; margin-bottom: 10px; }
        .message { margin-bottom: 8px; }
    </style>
</head>
<body>
<h2>Phòng Chat Nhóm</h2>
<div id="chat-box"></div>
<input type="text" id="message-input" placeholder="Nhập tin nhắn..." autocomplete="off">
<button onclick="sendMessage()">Gửi</button>

<script>
    var stompClient = null;
    var currentUsername = "";

    // 1. Kiểm tra đăng nhập ngay khi mở trang
    fetch('/api/auth/me')
        .then(response => {
            if(response.ok) return response.text();
            throw new Error("Unauthorized");
        })
        .then(username => {
            currentUsername = username; // Lưu lại tên thật
            connect(); // Xác thực xong mới mở kết nối chat
        })
        .catch(error => {
            window.location.href = "/login.html"; // Đá văng ra trang đăng nhập nếu chưa auth
        });

    function connect() {
        var socket = new SockJS('/ws');
        stompClient = Stomp.over(socket);
        stompClient.connect({}, function (frame) {
            console.log('Đã kết nối: ' + frame);
            stompClient.subscribe('/topic/public', function (messageOutput) {
                showMessage(JSON.parse(messageOutput.body));
            });
        });
    }
    function loadHistory() {
    fetch('/api/messages')
        .then(response => response.json())
        .then(messages => {
            messages.forEach(msg => showMessage(msg));
        });
    }

    function sendMessage() {
        var input = document.getElementById('message-input');
        var messageContent = input.value.trim();
        if(messageContent && stompClient) {
            var chatMessage = {
                sender: currentUsername, // Dùng tên thật lấy từ DB
                content: messageContent
            };
            stompClient.send("/app/chat.sendMessage", {}, JSON.stringify(chatMessage));
            input.value = '';
        }
    }

    function showMessage(message) {
        var chatBox = document.getElementById('chat-box');
        var p = document.createElement('p');
        p.className = "message";
        p.appendChild(document.createTextNode(message.sender + ": " + message.content));
        chatBox.appendChild(p);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>
</body>
</html>
